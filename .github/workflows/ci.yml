name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://baddecision.app
          NEXT_PUBLIC_DASHBOARD_URL: https://dashboard.baddecision.app
          NEXT_PUBLIC_API_URL: https://api.baddecision.app
          NEXT_PUBLIC_SUPPORT_EMAIL: support@baddecision.app
